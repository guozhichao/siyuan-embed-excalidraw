<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiYuan Block in Excalidraw</title>
  <style>
    body, #root {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    } 

    #root {
      position: relative;
    }

    /* 按钮容器 - 右上角，默认隐藏，聚焦时显示 */
    #button-container {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #button-container.button-visible {
      pointer-events: stroke;
      opacity: 1;
    }

    /* 按钮样式 */
    .siyuan-block-btn {
      padding: 4px 4px;
      font-size: 12px;
      border: none;
      border-radius: 4px;
      background: #ffffff;
      color: #333333;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s ease;
    }

    .siyuan-block-btn:hover {
      background: #f5f5f5;
      border-color: #1e80ff;
      color: #1e80ff;
    }

    .siyuan-block-btn:active {
      background: #e8e8e8;
    }

    /* Vditor 预览容器样式 */
    #preview {
      width: 100%;
      min-height: 100vh;
      padding: 15px 10px;
      box-sizing: border-box;
    }

    /* 加!important渲染为SVG时无法起作用，暂时先解决白板内的显示问题 */
    .language-abc,
    .hljs {
      overflow: hidden !important;
    }
  </style>
</head>
<body>
  <!-- 按钮容器 -->
  <div id="button-container">
    <button id="edit-button" class="siyuan-block-btn" title="Edit">
      <svg t="1772430333934" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="4813" width="24" height="24"><path d="M853.333333 501.333333c-17.066667 0-32 14.933333-32 32v320c0 6.4-4.266667 10.666667-10.666666 10.666667H170.666667c-6.4 0-10.666667-4.266667-10.666667-10.666667V213.333333c0-6.4 4.266667-10.666667 10.666667-10.666666h320c17.066667 0 32-14.933333 32-32s-14.933333-32-32-32H170.666667c-40.533333 0-74.666667 34.133333-74.666667 74.666666v640c0 40.533333 34.133333 74.666667 74.666667 74.666667h640c40.533333 0 74.666667-34.133333 74.666666-74.666667V533.333333c0-17.066667-14.933333-32-32-32z" fill="#666666" p-id="4814"></path><path d="M405.333333 484.266667l-32 125.866666c-2.133333 10.666667 0 23.466667 8.533334 29.866667 6.4 6.4 14.933333 8.533333 23.466666 8.533333h8.533334l125.866666-32c6.4-2.133333 10.666667-4.266667 14.933334-8.533333l300.8-300.8c38.4-38.4 38.4-102.4 0-140.8-38.4-38.4-102.4-38.4-140.8 0L413.866667 469.333333c-4.266667 4.266667-6.4 8.533333-8.533334 14.933334z m59.733334 23.466666L761.6 213.333333c12.8-12.8 36.266667-12.8 49.066667 0 12.8 12.8 12.8 36.266667 0 49.066667L516.266667 558.933333l-66.133334 17.066667 14.933334-68.266667z" fill="#666666" p-id="4815"></path></svg>

  </div>

  <!-- 内容容器 -->
  <div id="root"></div>

  <script type="module" src="./index.ts"></script>

</html>
